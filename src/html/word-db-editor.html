<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="
        default-src 'self';
        style-src 'self' 'unsafe-inline';
        connect-src *;
        script-src 'self' 'unsafe-inline';
        img-src 'self' data: blob: flashcard-image:;
        media-src 'self' blob: * flashcard-audio:;
        worker-src 'self' blob:;
    ">
    <title>Word Database Editor - mLearn</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html {
        background-color: #000000;
      }
      html, body, #root {
        width: 100%;
        height: 100%;
        overflow: hidden;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background-color: #000000;
        color: #ffffff;
      }
      #root:empty::after {
        content: ''; display: block; position: absolute;
        top: 50%; left: 50%; width: 40px; height: 40px;
        margin: -20px 0 0 -20px;
        border: 3px solid rgba(255,255,255,0.1);
        border-top-color: #6366f1; border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="../renderer/windows/wordDbEditor/index.tsx"></script>
  </body>
</html>

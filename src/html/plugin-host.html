<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="
        default-src 'self';
        style-src 'self' 'unsafe-inline' plugin-ui:;
        connect-src * plugin-ui:;
        script-src 'self' plugin-ui:;
        img-src 'self' data: blob: flashcard-image: local-media: plugin-ui:;
        media-src 'self' blob: * flashcard-audio: flashcard-video: local-media: plugin-ui:;
        worker-src 'self' blob:;
    ">
    <title>Plugin Host - mLearn</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html {
        background-color: var(--bg-nt-primary, #f5f5f5);
      }
      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
      }
      #root {
        width: 100%;
        height: 100%;
        overflow-y: auto;
        overflow-x: hidden;
      }
      body {
        font-family: var(--font-family-sans, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif);
        background-color: var(--bg-nt-primary, #f5f5f5);
        color: var(--text-primary, #1a1a1a);
      }
      @keyframes square-dash {
        0% { stroke-dashoffset: 0; }
        100% { stroke-dashoffset: -176; }
      }
      #loading-spinner {
        position: absolute;
        top: 50%;
        left: 50%;
        margin: -20px 0 0 -20px;
      }
      #root:not(:empty) + #loading-spinner {
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <svg id="loading-spinner" width="40" height="40" viewBox="0 0 48 48" role="img" aria-label="Loading">
      <rect x="2" y="2" width="44" height="44" fill="none" stroke="var(--border-color, rgba(85, 85, 85, 0.15))" stroke-width="8"/>
      <rect x="2" y="2" width="44" height="44" fill="none" stroke="var(--text-primary, #1a1a1a)" stroke-width="8" stroke-linecap="square" stroke-dasharray="44 132" style="animation: square-dash 1.2s linear infinite;"/>
    </svg>
    <script type="module" src="../renderer/windows/plugin-host/index.tsx"></script>
  </body>
</html>

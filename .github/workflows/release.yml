name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  changelog:
    name: Generate Release Notes
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.gh_release.outputs.upload_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Changelog
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | head -2 | tail -1)
          TAG="${GITHUB_REF_NAME}"
          echo "Tag: $TAG, Previous: $PREV_TAG"

          cat > release-notes.md << HEADER
          ## $TAG

          HEADER

          if [ -n "$PREV_TAG" ]; then
            COUNT=$(git rev-list --count "${PREV_TAG}..HEAD" 2>/dev/null || echo "0")
            echo "" >> release-notes.md
            echo "**${COUNT} commits** since ${PREV_TAG}" >> release-notes.md
            echo "" >> release-notes.md

            for section in "feat:🚀 Features" "fix:🐛 Bug Fixes" "refactor:♻️ Refactoring" "legal:⚖️ Legal & Licensing" "docs:📝 Documentation" "ci:⚙️ CI/CD" "chore:🔧 Chores & Maintenance" "test:🧪 Testing" "perf:⚡ Performance" "style:🎨 Styling" "i18n:🌐 Localization"; do
              prefix="${section%%:*}"
              label="${section#*:}"
              commits=$(git log "${PREV_TAG}..HEAD" --no-merges --pretty=format:"- %s" | grep -i "^\- ${prefix}" || true)
              if [ -n "$commits" ]; then
                echo "### ${label}" >> release-notes.md
                echo "$commits" | sed -E 's/(feat|fix|refactor|legal|docs|chore|test|perf|style|i18n|ci)(\([^)]*\))?[: ]+//gI' >> release-notes.md
                echo "" >> release-notes.md
              fi
            done

            uncategorized=$(git log "${PREV_TAG}..HEAD" --no-merges --pretty=format:"- %s" | grep -vi "^\- feat" | grep -vi "^\- fix" | grep -vi "^\- refactor" | grep -vi "^\- legal" | grep -vi "^\- docs" | grep -vi "^\- ci" | grep -vi "^\- chore" | grep -vi "^\- test" | grep -vi "^\- perf" | grep -vi "^\- style" | grep -vi "^\- i18n" || true)
            if [ -n "$uncategorized" ]; then
              echo "### 📦 Other Changes" >> release-notes.md
              echo "$uncategorized" >> release-notes.md
              echo "" >> release-notes.md
            fi
          else
            echo "Initial release" >> release-notes.md
          fi

          cat release-notes.md

      - name: Create Release
        id: gh_release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          draft: true
          fail_on_unmatched_files: false

  build-mac:
    needs: changelog
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package.json

      - name: Install dependencies
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 20
          max_attempts: 3
          command: npm install --no-audit --no-fund --prefer-offline

      - name: Build Extension
        run: npm run build:extension

      - name: Build macOS
        run: npm run build && npx electron-builder --mac --universal --publish=never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Rename macOS Artifacts
        run: |
          cd release
          VERSION=${GITHUB_REF_NAME#v}
          for f in mLearn-*.dmg; do
            if [ -f "$f" ] && [[ "$f" != *-universal* ]]; then
              mv "$f" "mLearn-${VERSION}-universal.dmg"
            fi
          done
          for f in mLearn-*.zip; do
            if [ -f "$f" ] && [[ "$f" != *-universal-mac* ]]; then
              mv "$f" "mLearn-${VERSION}-universal-mac.zip"
            fi
          done

      - name: Upload macOS Artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            release/*.dmg
            release/*.zip

  build-win:
    needs: changelog
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package.json

      - name: Clean node_modules (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: Remove-Item -Recurse -Force node_modules -ErrorAction SilentlyContinue

      - name: Install dependencies
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 20
          max_attempts: 3
          command: npm install --no-audit --no-fund --prefer-offline

      - name: Build Extension
        shell: bash
        run: |
          rm -rf extension/dist
          mkdir -p extension/dist/popup extension/dist/icons
          npx tsc -p extension/tsconfig.json --noEmit
          npx esbuild extension/src/content-script.ts --bundle --platform=browser --outfile=extension/dist/content-script.js --format=iife
          npx esbuild extension/src/background.ts --bundle --platform=browser --outfile=extension/dist/background.js --format=iife
          npx esbuild extension/src/popup/popup.ts --platform=browser --outfile=extension/dist/popup/popup.js --format=esm
          cp extension/manifest.json extension/dist/manifest.json
          cp extension/src/popup/popup.html extension/src/popup/popup.css extension/dist/popup/
          cp extension/icons/*.png extension/dist/icons/

      - name: Build Windows
        run: npm run build && npx electron-builder --win --publish=never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Zip Unpacked Directories
        shell: powershell
        run: |
          $releaseDir = "release"
          $unpackedDirs = Get-ChildItem -Path $releaseDir -Directory -Filter "*-unpacked"
          foreach ($dir in $unpackedDirs) {
            $zipName = "$($dir.Name).zip"
            $zipPath = Join-Path $releaseDir $zipName
            Compress-Archive -Path "$($dir.FullName)\*" -DestinationPath $zipPath -Force
            Write-Host "Created $zipName"
          }

      - name: Upload Windows Artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            release/*.exe
            release/*.zip

  build-linux:
    needs: changelog
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package.json

      - name: Install dependencies
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 20
          max_attempts: 3
          command: npm install --no-audit --no-fund --prefer-offline

      - name: Build Extension
        run: npm run build:extension

      - name: Build Linux
        run: npm run build && npx electron-builder --linux --publish=never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Rename Linux Artifacts
        run: |
          cd release
          VERSION=${GITHUB_REF_NAME#v}
          # Rename x64 AppImage to remove arch suffix
          for f in mLearn-*-x64.AppImage; do
            if [ -f "$f" ]; then
              mv "$f" "mLearn-${VERSION}.AppImage"
            fi
          done

      - name: Package Linux Installers
        run: |
          cd release
          VERSION=${GITHUB_REF_NAME#v}
          # Zip deb files as installers
          for deb in mLearn_*_amd64.deb; do
            if [ -f "$deb" ]; then
              zip "mLearn-${VERSION}-linux-x64.zip" "$deb"
              break
            fi
          done
          for deb in mLearn_*_arm64.deb; do
            if [ -f "$deb" ]; then
              zip "mLearn-${VERSION}-linux-arm64.zip" "$deb"
              break
            fi
          done

      - name: Upload Linux Artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            release/*.AppImage
            release/*.zip
            release/*.deb

  update-website:
    name: Update Website
    needs: [build-mac, build-win, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout App Repo
        uses: actions/checkout@v4

      - name: Checkout Website
        uses: actions/checkout@v4
        with:
          repository: adrianvla/mlearn-cloud
          token: ${{ secrets.WEBSITE_PAT }}
          path: website

      - name: Checkout Versioning
        uses: actions/checkout@v4
        with:
          repository: adrianvla/mlearn-versioning
          token: ${{ secrets.WEBSITE_PAT }}
          path: versioning

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Update Version
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "Updating version to ${VERSION}"
          sed -i "s/const version = \".*\";/const version = \"${VERSION}\";/" website/frontend/public/download/auto/page.js
          sed -i "s/\"latest\": \".*\"/\"latest\": \"${VERSION}\"/" versioning/version-info.json
          sed -i "s/\"changelog\": \".*\"/\"changelog\": \"See full release notes at https:\/\/github.com\/adrianvla\/mLearn\/releases\/tag\/v${VERSION}\"/" versioning/version-info.json
          echo "--- page.js version line ---"
          grep "const version" website/frontend/public/download/auto/page.js
          echo "--- version-info.json ---"
          cat versioning/version-info.json

      - name: Install Website Dependencies
        run: |
          cd website
          npm install
          cd frontend && npm install && cd ..
          cd worker && npm install && cd ..

      - name: Commit and Push Website
        run: |
          cd website
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add frontend/public/download/auto/page.js
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: bump version to ${GITHUB_REF_NAME}"
            for branch in master main; do
              if git show-ref --verify --quiet refs/remotes/origin/$branch; then
                git push origin $branch
              else
                echo "Branch $branch does not exist on remote, skipping"
              fi
            done
          fi

      - name: Commit and Push Versioning
        run: |
          cd versioning
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add version-info.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: bump version to ${GITHUB_REF_NAME}"
            git push origin main || git push origin master || true
          fi

      - name: Link Legal Docs for Worker Build
        run: |
          mkdir -p mlearn-ts
          cp TERMS_OF_SERVICE.md PRIVACY_POLICY.md EULA.md mlearn-ts/

      - name: Deploy Website
        run: |
          cd website/frontend
          npm run build
          npx wrangler pages deploy dist/client --branch main --commit-dirty=true
          cd ../worker
          npm run predeploy
          npm run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          VITE_API_BASE_URL: https://mlearn-cloud.kikan.net
          VITE_SUPABASE_URL: https://txacpviufzpvieiabwzg.supabase.co
          VITE_SUPABASE_ANON_KEY: sb_publishable_G0ZiKYlL96Bqxnty-_s9SA_x6WQgPqJ

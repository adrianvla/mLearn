<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>mLearn</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <header class="popup-header">
      <span class="logo">mLearn</span>
      <div class="connection-status" id="connectionStatus">
        <span class="status-dot" id="statusDot"></span>
        <span class="status-text" id="statusText">mLearn not running</span>
      </div>
    </header>

    <section class="video-state" id="videoState">
      <div class="state-row">
        <span class="state-label">Time</span>
        <span class="state-value" id="timeValue">--:--</span>
      </div>
      <div class="state-row">
        <span class="state-label">State</span>
        <span class="state-value" id="playValue">No video</span>
      </div>
      <div class="state-row">
        <span class="state-label">Volume</span>
        <span class="state-value" id="volumeValue">--</span>
      </div>
    </section>

    <section class="actions" id="actionsSection">
      <div class="playback-controls">
        <button class="btn btn-secondary" id="seekBackBtn" type="button">-5s</button>
        <button class="btn btn-primary" id="playPauseBtn" type="button" disabled>Play</button>
        <button class="btn btn-secondary" id="seekForwardBtn" type="button">+5s</button>
      </div>
      <button class="btn btn-primary" id="requestSyncBtn" type="button">Request Sync</button>
      <button class="btn btn-secondary" id="openOverlayBtn" type="button">Open Overlay</button>
    </section>

    <section class="headless-section hidden" id="headlessSection">
      <div class="headless-header">
        <span class="headless-label">Headless Mode</span>
        <button class="btn btn-toggle" id="headlessToggleBtn" type="button">Enable</button>
      </div>
    </section>

    <section class="headless-controls hidden" id="headlessControls">
      <div class="headless-divider"></div>

      <div class="subtitle-controls">
        <h4>Subtitles</h4>
        <button class="btn btn-secondary" id="loadSubtitlesBtn" type="button">Load Subtitle File</button>
        <div class="offset-control">
          <span class="offset-label">Sync Offset</span>
          <div class="offset-buttons">
            <button class="btn btn-small" id="offsetDecreaseBtn" type="button">-100ms</button>
            <span class="offset-value" id="offsetValue">0ms</span>
            <button class="btn btn-small" id="offsetIncreaseBtn" type="button">+100ms</button>
          </div>
        </div>
      </div>

      <div class="watch-together-controls">
        <h4>Watch Together</h4>
        <div class="watch-together-signed-out hidden" id="watchTogetherSignedOut">
          <p class="hint-text">Sign in to use Watch Together</p>
          <button class="btn btn-primary" id="signInBtn" type="button">Sign In</button>
        </div>
        <div class="watch-together-panel" id="watchTogetherPanel">
          <div class="watch-together-tabs" id="watchTogetherTabs">
            <button class="tab-btn active" data-tab="host" type="button">Host</button>
            <button class="tab-btn" data-tab="join" type="button">Join</button>
          </div>
          <div class="tab-content active" data-tab-content="host">
            <button class="btn btn-primary" id="createRoomBtn" type="button">Create Room</button>
          </div>
          <div class="tab-content" data-tab-content="join">
            <div class="join-input-group">
              <input type="text" id="joinRoomCode" placeholder="Enter room code" maxlength="8">
              <button class="btn btn-primary" id="joinRoomBtn" type="button">Join</button>
            </div>
          </div>
          <div class="room-active hidden" id="roomActive">
            <div class="room-info">
              <span class="room-label">Room Code</span>
              <span class="room-code" id="roomCodeValue">-</span>
            </div>
            <div class="room-info">
              <span class="room-label">Peers</span>
              <span class="room-peers" id="roomPeersValue">0</span>
            </div>
            <button class="btn btn-danger" id="leaveRoomBtn" type="button">Leave Room</button>
          </div>
        </div>
      </div>
    </section>
  </div>
  <script src="popup.js" type="module"></script>
</body>
</html>
